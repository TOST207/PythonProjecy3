{% extends 'theme.html' %}

{% block title %}Календарь мероприятий{% endblock %}

{% block content %}
<div class="row mb-4">
    <div class="col-12">
        <h2><i class="bi bi-calendar-month"></i> Календарь мероприятий</h2>
    </div>
</div>

<div class="calendar-header">
    <button class="btn btn-outline-primary" id="prevMonth">
        <i class="bi bi-chevron-left"></i> Назад
    </button>
    <h3 class="mb-0" id="currentMonth"></h3>
    <button class="btn btn-outline-primary" id="nextMonth">
        Вперед <i class="bi bi-chevron-right"></i>
    </button>
</div>

<div class="calendar-grid" id="calendar">
    <!-- Days headers -->
    <div class="calendar-day-header">Пн</div>
    <div class="calendar-day-header">Вт</div>
    <div class="calendar-day-header">Ср</div>
    <div class="calendar-day-header">Чт</div>
    <div class="calendar-day-header">Пт</div>
    <div class="calendar-day-header">Сб</div>
    <div class="calendar-day-header">Вс</div>
    <!-- Days will be generated by JavaScript -->
</div>

<!-- Event Detail Modal -->
<div class="modal fade" id="eventModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="eventModalTitle">Мероприятие</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body" id="eventModalBody">
                <!-- Event details -->
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Закрыть</button>
                <a href="#" class="btn btn-primary" id="eventDetailsBtn">Подробнее</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
let currentDate = new Date();
let eventsData = {{ events_json|safe }};

function renderCalendar(year, month) {
    const firstDay = new Date(year, month, 1);
    const lastDay = new Date(year, month + 1, 0);
    const prevLastDay = new Date(year, month, 0);
    
    const monthNames = ["Январь", "Февраль", "Март", "Апрель", "Май", "Июнь",
                       "Июль", "Август", "Сентябрь", "Октябрь", "Ноябрь", "Декабрь"];
    
    document.getElementById('currentMonth').textContent = 
        `${monthNames[month]} ${year}`;
    
    const calendar = document.getElementById('calendar');
    // Clear previous days (keep headers)
    const headers = calendar.querySelectorAll('.calendar-day-header');
    calendar.innerHTML = '';
    headers.forEach(h => calendar.appendChild(h));
    
    let firstDayIndex = firstDay.getDay() - 1;
    if (firstDayIndex === -1) firstDayIndex = 6;
    
    // Previous month days
    for (let i = firstDayIndex; i > 0; i--) {
        const dayDiv = document.createElement('div');
        dayDiv.className = 'calendar-day other-month';
        const dayNum = prevLastDay.getDate() - i + 1;
        dayDiv.innerHTML = `<div class="calendar-day-number">${dayNum}</div>`;
        calendar.appendChild(dayDiv);
    }
    
    // Current month days
    const today = new Date();
    for (let day = 1; day <= lastDay.getDate(); day++) {
        const dayDiv = document.createElement('div');
        dayDiv.className = 'calendar-day';
        
        const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
        const dayEvents = eventsData.filter(e => e.start_date.startsWith(dateStr));
        
        let isToday = (day === today.getDate() && 
                      month === today.getMonth() && 
                      year === today.getFullYear());
        
        if (isToday) dayDiv.classList.add('today');
        
        let eventsHtml = dayEvents.map(e => 
            `<div class="event-indicator ${e.is_organizer ? 'organizer' : ''}" 
                  onclick="showEvent(${e.id})">${e.title}</div>`
        ).join('');
        
        dayDiv.innerHTML = `
            <div class="calendar-day-number">${day}</div>
            ${eventsHtml}
        `;
        
        calendar.appendChild(dayDiv);
    }
    
    // Next month days
    const totalCells = firstDayIndex + lastDay.getDate();
    const remainingCells = 42 - totalCells;
    for (let day = 1; day <= remainingCells; day++) {
        const dayDiv = document.createElement('div');
        dayDiv.className = 'calendar-day other-month';
        dayDiv.innerHTML = `<div class="calendar-day-number">${day}</div>`;
        calendar.appendChild(dayDiv);
    }
}

function showEvent(eventId) {
    const event = eventsData.find(e => e.id === eventId);
    if (!event) return;
    
    document.getElementById('eventModalTitle').textContent = event.title;
    document.getElementById('eventModalBody').innerHTML = `
        <p><strong>Описание:</strong> ${event.description}</p>
        <p><strong>Начало:</strong> ${new Date(event.start_date).toLocaleString('ru-RU')}</p>
        <p><strong>Окончание:</strong> ${new Date(event.end_date).toLocaleString('ru-RU')}</p>
        <p><strong>Место:</strong> ${event.location_name || 'Не указано'}</p>
        <p><strong>Организатор:</strong> ${event.organizer_name}</p>
        <p><strong>Участников:</strong> ${event.participants_count} / ${event.max_participants}</p>
    `;
    document.getElementById('eventDetailsBtn').href = `/events/${eventId}/`;
    
    new bootstrap.Modal(document.getElementById('eventModal')).show();
}

document.getElementById('prevMonth').addEventListener('click', () => {
    currentDate.setMonth(currentDate.getMonth() - 1);
    renderCalendar(currentDate.getFullYear(), currentDate.getMonth());
});

document.getElementById('nextMonth').addEventListener('click', () => {
    currentDate.setMonth(currentDate.getMonth() + 1);
    renderCalendar(currentDate.getFullYear(), currentDate.getMonth());
});

renderCalendar(currentDate.getFullYear(), currentDate.getMonth());
</script>
{% endblock %}
